runConfig:
  maxInstances: 2
  minInstances: 0
  memory: 512Mi
  cpu: 1

env:
  # Secretos para pasarela de pagos e IA (Configurar en App Hosting -> Settings -> Environment Variables)
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: GOOGLE_GENAI_API_KEY
    secret: GOOGLE_GENAI_API_KEY
  
  # Variables Públicas de Firebase (Copiar de Project Settings -> General -> Your Apps -> Config)
  # Debes poner tus valores reales aquí para que el sitio funcione en internet.
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "TU_API_KEY_AQUI"
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "TU_AUTH_DOMAIN_AQUI"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "TU_PROJECT_ID_AQUI"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "TU_STORAGE_BUCKET_AQUI"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "TU_MESSAGING_SENDER_ID_AQUI"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "TU_APP_ID_AQUI"
