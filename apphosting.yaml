# Configuración de App Hosting para Tecnorampa Pro-Store
runConfig:
  maxInstances: 2
  minInstances: 0
  memory: 512Mi
  cpu: 1

# Los secretos deben coincidir con los nombres creados en la consola de Firebase
env:
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "placeholder" # Se inyecta automáticamente desde el entorno
  - variable: GOOGLE_GENAI_API_KEY
    secret: GOOGLE_GENAI_API_KEY