
# Configuración de App Hosting para Tecnorampa Pro-Store
# Las variables de entorno en App Hosting se inyectan automáticamente desde la consola de Firebase.
# Solo definimos los Secretos críticos.

runConfig:
  maxInstances: 2
  minInstances: 0
  memory: 512Mi
  cpu: 1

# Los nombres aquí deben coincidir con los "Secretos" creados en la Consola de Firebase -> App Hosting -> Settings
env:
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: GOOGLE_GENAI_API_KEY
    secret: GOOGLE_GENAI_API_KEY
